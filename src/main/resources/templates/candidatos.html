<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Votacion</title>
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
</head>
<body>
<nav>
    <button>
        <a th:href="@{/}">Volver</a>
    </button>
</nav>
<div class="container">
    <br>
    <div class="row">
        <h1>Candidatos presidenciales</h1>
    </div>
    <br>
    <br>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Id</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Partido</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <form th:action="@{/votacion}" method="post">
        <button type="submit" class="class btn btn-secondary">Voto nulo</button>
        </form>
        <br>
        <br>
        <tr th:each="candidato: ${candidatos}">
            <td th:text="${candidato.id}"></td>
            <td th:text="${candidato.nombre}"></td>
            <td th:text="${candidato.apellido}"></td>
            <td th:text="${candidato.partido.nombre}"></td>
            <td>
                <form th:action="@{/votacion/{id}(id=${candidato.id})}"
                      method="post">
                    <button type="submit" class="class btn btn-primary"
                   >Votar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
